<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - View Applications</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f9; }
    header { background: #1e3a8a; color: white; padding: 20px; text-align: center; }
    .container { max-width: 1200px; margin: 30px auto; padding: 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 25px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #f8fafc; }
    .photo { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
    .empty { text-align: center; padding: 60px; color: #888; font-size: 18px; }
  </style>
</head>
<body>
  <header>
    <h1>🔒 Team Management - Applications</h1>
    <p>Only Team Manager & Vice Team Manager can access this page</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>All Received Applications (<span id="count">0</span>)</h2>
      <div id="applicationsList"></div>
    </div>
  </div>

  <script>
    function renderApplications() {
      const applications = JSON.parse(localStorage.getItem('applications') || '[]');
      const container = document.getElementById('applicationsList');
      document.getElementById('count').textContent = applications.length;

      if (applications.length === 0) {
        container.innerHTML = `<div class="empty">No applications received yet.</div>`;
        return;
      }

      let html = `<table><thead><tr><th>Date</th><th>Photo</th><th>Name</th><th>Position</th><th>Email</th><th>Message</th></tr></thead><tbody>`;

      applications.forEach(app => {
        const date = new Date(app.timestamp).toLocaleString();
        html += `
          <tr>
            <td>${date}</td>
            <td><img src="${app.photo}" class="photo"></td>
            <td><strong>${app.name}</strong></td>
            <td>${app.position}</td>
            <td>${app.email}</td>
            <td>${app.message.substring(0, 100)}...</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    // Auto refresh every 3 seconds
    setInterval(renderApplications, 3000);
    renderApplications();
  </script>
</body>
</html>
