<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply to Join Our Team</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f9; }
    header { background: #1e3a8a; color: white; padding: 30px; text-align: center; }
    .container { max-width: 700px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { background: #1e3a8a; color: white; padding: 14px 30px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    footer { text-align: center; margin: 40px; color: #555; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <h1>Join Our Team</h1>
    <p>Submit your application below</p>
  </header>

  <div class="container">
    <form id="applicationForm">
      <label>Name</label>
      <input type="text" id="name" required>

      <label>Position Applied For</label>
      <select id="position" required>
        <option value="">Select Position</option>
        <option value="Team Manager">Team Manager</option>
        <option value="Vice Team Manager">Vice Team Manager</option>
        <option value="Senior Team Member">Senior Team Member</option>
        <option value="Intermediate Team Member">Intermediate Team Member</option>
        <option value="Junior Team Member">Junior Team Member</option>
      </select>

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Message / Why do you want to join?</label>
      <textarea id="message" rows="6" required></textarea>

      <label>Upload Your Photo</label>
      <input type="file" id="photo" accept="image/*" required>

      <button type="submit">Submit Application</button>
    </form>
  </div>

  <footer>
    Team Manager: the Highest rank among the members; Vice Team Manager: The rank is equal to or lower than the team manager; Senior Team Member: Rank: Platinum 1+ ... (and the rest of your text)
  </footer>

  <script>
    document.getElementById('applicationForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const file = document.getElementById('photo').files[0];
      const reader = new FileReader();

      reader.onload = function(event) {
        const applications = JSON.parse(localStorage.getItem('applications') || '[]');
        
        applications.unshift({
          name: document.getElementById('name').value,
          position: document.getElementById('position').value,
          email: document.getElementById('email').value,
          message: document.getElementById('message').value,
          photo: event.target.result,
          timestamp: new Date().toISOString()
        });

        localStorage.setItem('applications', JSON.stringify(applications));
        alert('✅ Application submitted successfully!');
        e.target.reset();
      };

      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
